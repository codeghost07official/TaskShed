<!DOCTYPE html>
<html lang="en" class="{% if user.theme == 'dark' %}dark{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskShed - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-950 dark:text-slate-50 font-sans min-h-screen transition-colors duration-300">

    <header class="border-b border-slate-200/80 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-xl font-black text-blue-600 dark:text-blue-500">TaskShed</span>
                <span class="text-xs font-semibold px-2.5 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-full">Dashboard</span>
                
                <a href="https://github.com/codeghost07official/TaskShed" target="_blank" class="text-xs font-medium text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-colors flex items-center gap-1 pl-1">
                    Code ↗
                </a>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-xl transition-colors {% if user.theme == 'dark' %}bg-slate-800 hover:bg-slate-700 text-white{% else %}bg-slate-100 hover:bg-slate-200 text-slate-700{% endif %}" title="Toggle Theme">
                    <span id="theme-icon">{% if user.theme == 'dark' %}☀️ Light Mode{% else %}🌙 Dark Mode{% endif %}</span>
                </button>
                
                <div class="flex items-center gap-3 border-l border-slate-200 dark:border-slate-800 pl-4">
                    <span class="text-sm font-medium hidden sm:inline">{{ user.name }}</span>
                    <a href="{{ url_for('logout') }}" class="text-xs font-bold text-red-500 hover:text-red-600 border border-red-200 dark:border-red-900/50 bg-red-50/50 dark:bg-red-950/20 px-3 py-2 rounded-xl transition-all">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-2 space-y-6">
            <div class="bg-white dark:bg-slate-800/40 border border-slate-200/80 dark:border-slate-800 rounded-2xl p-6 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-colors">
                <div>
                    <h2 class="text-lg font-bold">Focus Schedule</h2>
                    <p class="text-xs text-slate-400 dark:text-slate-500">Select a specific date to organize your tasks</p>
                </div>
                <input type="date" id="task-date" class="border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 bg-white dark:bg-slate-800 text-slate-950 dark:text-white transition-all">
            </div>

            <div class="bg-white dark:bg-slate-800/40 border border-slate-200/80 dark:border-slate-800 rounded-2xl p-6 shadow-sm transition-colors">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-base">Tasks for <span id="selected-date-label" class="text-blue-600 dark:text-blue-400">...</span></h3>
                    <button id="clear-all-btn" class="text-xs font-medium text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition-colors">Clear All Tasks</button>
                </div>

                <form id="add-task-form" class="flex gap-2 mb-6">
                    <input type="text" id="task-input" placeholder="What is your next objective?" required class="flex-1 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-slate-950 dark:text-white transition-all">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 rounded-xl text-sm transition-colors shadow-sm">Add</button>
                </form>

                <ul id="task-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                </ul>
            </div>
        </section>

        <section class="space-y-6">
            <div class="bg-white dark:bg-slate-800/40 border border-slate-200/80 dark:border-slate-800 rounded-2xl p-8 shadow-sm flex flex-col items-center text-center transition-colors">
                <span id="timer-status-badge" class="text-xs font-bold uppercase tracking-widest text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/30 px-3 py-1 rounded-full mb-6 transition-colors">Work Session</span>
                
                <div class="text-6xl font-black tracking-tight tabular-nums my-4 text-slate-800 dark:text-white" id="timer-display">
                    25:00
                </div>

                <audio id="timer-bell" src="{{ url_for('static', filename='audio/bell.mp3') }}" preload="auto"></audio>

                <div class="flex gap-3 w-full mt-6">
                    <button id="start-btn" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-xl text-sm transition-all shadow-sm dark:bg-blue-600 dark:hover:bg-blue-700">Start</button>
                    <button id="pause-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl text-sm transition-all hidden dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600">Pause</button>
                    <button id="reset-btn" class="border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 font-semibold px-5 rounded-xl text-sm transition-all">Reset</button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800/40 border border-slate-200/80 dark:border-slate-800 rounded-2xl p-6 shadow-sm transition-colors">
                <h3 class="font-bold text-sm mb-4">Timer Engine Parameters</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 dark:text-slate-500 mb-1">Work (Min)</label>
                        <input type="number" id="work-duration" min="1" max="60" value="{{ user.pomodoro_work }}" class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-slate-950 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 dark:text-slate-500 mb-1">Break (Min)</label>
                        <input type="number" id="break-duration" min="1" max="60" value="{{ user.pomodoro_break }}" class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-slate-950 dark:text-white">
                    </div>
                </div>
                <button id="save-settings-btn" class="w-full text-xs bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 font-bold py-2.5 rounded-xl text-slate-700 dark:text-slate-300 transition-colors">Save Engine Durations</button>
            </div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
